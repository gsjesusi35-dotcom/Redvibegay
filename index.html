<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedVibegay</title>
    <script src="https://sensibleexterminatorprivate.com/fe/0b/6a/fe0b6a58ba0f6b2dab98a6738d5e87aa.js"></script>
    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
    <style>
        body { margin: 0; background: #c2e9fb; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }
        .screen { background: white; width: 100%; max-width: 350px; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; box-sizing: border-box; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #6c63ff; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .hidden { display: none; }
        .hero-img { width: 100%; border-radius: 15px; margin-bottom: 10px; }
        .bienvenida { font-weight: bold; color: #6c63ff; margin-bottom: 15px; font-size: 1em; }
        .del-btn { background: #ff4757; font-size: 10px; padding: 5px; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .like-btn, .share-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 5px; }
        .like-btn { color: red; }
        .share-btn { color: #6c63ff; }
        .chat-btn { background: #27ae60; font-size: 10px; padding: 5px; margin-left: 5px; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .com-section { font-size: 12px; margin-top: 10px; padding-top: 5px; border-top: 1px solid #eee; text-align: left; }
        #contador-usuarios { font-size: 14px; color: #555; margin-bottom: 10px; font-weight: bold; }
        .nav-bar { display: flex; justify-content: space-between; background: #6c63ff; padding: 8px; border-radius: 10px; margin: 10px 0; gap: 5px; }
        .nav-btn { flex: 1; background: white; color: #6c63ff; border: none; padding: 8px 5px; border-radius: 5px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .nav-btn.salir { background: #ff4757; color: white; flex: 0.5; }
        
        /* Estilos del anuncio centrado (Corregido) */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        
        /* El modal-content ahora tiene posición relativa para la 'x' absoluta */
        .modal-content { 
            background: white; 
            padding: 40px 20px 30px 20px; /* Más espacio arriba para la 'x' */
            border-radius: 20px; 
            max-width: 320px; 
            width: 85%; 
            position: relative; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            text-align: center; 
        }
        
        /* La 'x' de cierre corregida en la esquina superior derecha */
        .close-btn { 
            position: absolute; 
            top: 12px; /* Ajuste para que se vea bien arriba */
            right: 15px; /* Ajuste para que se vea bien a un lado */
            background: transparent; 
            border: none; 
            color: #888; /* Un color un poco más oscuro para que se vea mejor */
            font-size: 28px; /* Un tamaño más grande y visible */
            cursor: pointer; 
            font-weight: bold; 
            line-height: 1; 
            padding: 5px; /* Más área de toque */
        }
        .close-btn:hover { color: #333; }
        
        .modal-text { margin: 0; font-size: 16px; color: #333; font-weight: bold; line-height: 1.4; }
    </style>
</head>
<body>

    <!-- Nuevo Mensaje Centrado en Pantalla -->
    <div id="anuncio-centrado" class="modal-overlay">
        <div class="modal-content">
            <button onclick="cerrarAnuncio()" class="close-btn">&times;</button>
            <p class="modal-text">¡Disfruta el mejor contenido hetero y gay!</p>
        </div>
    </div>

    <div id="screen-login" class="screen hidden">
        <img src="https://i.ibb.co/G3C6s15X/1781744766796-edit-755643990183886.png" class="hero-img">
        <div class="bienvenida">¡Bienvenidos a Redvibegay, publica tu mejor foto y gana muchos ❤️!</div>
        <div id="contador-usuarios">Cargando registros...</div>
        <input type="text" id="regUsuario" placeholder="Nombre de usuario">
        <input type="email" id="regEmail" placeholder="Correo electrónico">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="realizarRegistro()">Registrarse / Iniciar Sesión</button>
    </div>

    <div id="screen-feed" class="screen">
        <div class="nav-bar-top"></div>
        <h3>Feed</h3>
        <textarea id="postText" placeholder="¿Qué cuentas?"></textarea>
        <input type="file" id="postImage" accept="image/*">
        <button onclick="publicar()">Publicar</button>
        <div id="contenedor-posts"></div>
        <div class="nav-bar-bottom"></div>
    </div>

    <div id="screen-mensajes" class="screen hidden">
        <div class="nav-bar-top"></div>
        <h3>Tus Conversaciones</h3>
        <div id="usuarios-chat"></div>
        <div class="nav-bar-bottom"></div>
    </div>

    <div id="screen-chat" class="screen hidden">
        <button style="background:#888;" onclick="mostrarPantalla('screen-mensajes')">⬅️ Volver</button>
        <h3 id="titulo-chat">Chat</h3>
        <div id="mensajes-chat" style="height:200px; overflow-y:scroll; border:1px solid #ddd; margin-bottom:10px; padding: 5px;"></div>
        <input id="input-mensaje" placeholder="Escribe...">
        <input type="file" id="chatImage" accept="image/*">
        <button onclick="enviarMensaje()">Enviar</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc, increment, getCountFromServer, where, getDocs } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDfrcX-dVLcetH4E_jpy2CMdC8-Y7QkAbo", authDomain: "redvibegay.firebaseapp.com", projectId: "redvibegay", storageBucket: "redvibegay.appspot.com", messagingSenderId: "786235488205", appId: "1:786235488205:web:cead1dc3ad9040f435b684" };
        const db = getFirestore(initializeApp(firebaseConfig));
        let chatActivoId = null;

        const obtenerUsuario = () => localStorage.getItem("usuario") || "Invitado";

        window.cerrarAnuncio = () => { document.getElementById('anuncio-centrado').style.display = 'none'; };

        window.actualizarBarras = (noLeidos) => {
            const logueado = localStorage.getItem("usuario");
            const html = `<div class="nav-bar">${logueado ? `<button class="nav-btn" onclick="mostrarPantalla('screen-feed')">Feed</button><button class="nav-btn" onclick="mostrarPantalla('screen-mensajes')">Msg (${noLeidos})</button><button class="nav-btn" style="background:#f1c40f; color:black;" onclick="abrirChatVivo()">Live</button><button class="nav-btn salir" onclick="cerrarSesion()">Salir</button>` : `<button class="nav-btn" onclick="mostrarPantalla('screen-login')">Iniciar Sesión</button>`}</div>`;
            document.querySelectorAll('.nav-bar-top, .nav-bar-bottom').forEach(el => el.innerHTML = html);
        }

        window.abrirChatVivo = () => { if(!localStorage.getItem("usuario")) return mostrarPantalla('screen-login'); chatActivoId = "CHAT_GLOBAL"; document.getElementById("titulo-chat").innerText = "Chat Global"; mostrarPantalla('screen-chat'); };

        async function actualizarContador() { const snapshot = await getCountFromServer(collection(db, "usuarios")); document.getElementById("contador-usuarios").innerText = "Usuarios registrados: " + snapshot.data().count; }
        
        window.onload = () => { actualizarContador(); cargarPosts(); actualizarBarras(0); };

        window.mostrarPantalla = (id) => { document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); };
        
        window.realizarRegistro = async () => {
            const user = document.getElementById('regUsuario').value; const email = document.getElementById('regEmail').value; const pass = document.getElementById('pass').value;
            if(!user || !email || !pass) return alert("Completa los campos");
            const q = query(collection(db, "usuarios"), where("email", "==", email)); const querySnapshot = await getDocs(q);
            if (querySnapshot.empty) { await addDoc(collection(db, "usuarios"), { nombre: user, email: email }); actualizarContador(); }
            localStorage.setItem("usuario", user); location.reload();
        };

        window.cerrarSesion = () => { localStorage.removeItem("usuario"); location.reload(); };

        window.publicar = async () => {
            if(!localStorage.getItem("usuario")) return mostrarPantalla('screen-login');
            const texto = document.getElementById('postText').value; const archivoInput = document.getElementById('postImage');
            if (!texto && archivoInput.files.length === 0) return alert("Escribe algo");
            let imagenBase64 = await procesarImagen(archivoInput);
            await addDoc(collection(db, "posts"), { contenido: texto, imagenPost: imagenBase64, autor: localStorage.getItem("usuario"), fecha: new Date(), likes: 0 });
            document.getElementById('postText').value = ""; archivoInput.value = "";
        };

        async function procesarImagen(input) {
            if (input.files.length === 0) return "";
            return new Promise((res) => { const reader = new FileReader(); reader.onload = (e) => { const img = new Image(); img.src = e.target.result; img.onload = () => { const canvas = document.createElement('canvas'); canvas.width = 300; canvas.height = (img.height / img.width) * 300; canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height); res(canvas.toDataURL('image/jpeg', 0.5)); }; }; reader.readAsDataURL(input.files[0]); });
        }

        window.darLike = async (id) => { await updateDoc(doc(db, "posts", id), { likes: increment(1) }); };
        
        window.compartirPost = async (contenido, id) => {
            const baseUrl = window.location.href.split('?')[0];
            const link = `${baseUrl}?postId=${id}`;
            if (navigator.share) { try { await navigator.share({ title: 'RedVibegay', text: '¡Mira este post!', url: link }); } catch (e) { console.log(e); } } else { alert("Link copiado: " + link); }
        };

        window.eliminarPost = async (id) => { if(confirm("¿Seguro?")) await deleteDoc(doc(db, "posts", id)); };
        
        window.comentar = async (id) => { 
            const txt = document.getElementById('com-'+id).value;
            if(!txt) return;
            await addDoc(collection(db, "posts", id, "comentarios"), { autor: obtenerUsuario(), texto: txt, fecha: new Date() }); 
            document.getElementById('com-'+id).value = ""; 
        };

        window.iniciarChat = async (nombreDestino) => { if(!localStorage.getItem("usuario")) return mostrarPantalla('screen-login'); chatActivoId = nombreDestino; document.getElementById("titulo-chat").innerText = "Chat con " + nombreDestino; mostrarPantalla('screen-chat'); };

        window.enviarMensaje = async () => {
            const texto = document.getElementById('input-mensaje').value; 
            const archivoInput = document.getElementById('chatImage'); 
            if (!texto && archivoInput.files.length === 0) return;
            let imagenBase64 = await procesarImagen(archivoInput); 
            await addDoc(collection(db, "mensajes"), { de: localStorage.getItem("usuario"), para: chatActivoId, texto: texto, imagenMensaje: imagenBase64, fecha: new Date() });
            document.getElementById('input-mensaje').value = ""; archivoInput.value = ""; 
        };

        function cargarPosts() {
            const usuarioLogueado = localStorage.getItem("usuario");
            const urlParams = new URLSearchParams(window.location.search);
            const postIdParam = urlParams.get('postId');

            onSnapshot(query(collection(db, "posts"), orderBy("fecha", "desc")), (snap) => {
                const contenedor = document.getElementById('contenedor-posts'); contenedor.innerHTML = "";
                snap.forEach((d) => {
                    if (postIdParam && d.id !== postIdParam) return;
                    const p = d.data(); const id = d.id;
                    const btnElim = p.autor === usuarioLogueado ? `<button class="del-btn" onclick="eliminarPost('${id}')">Eliminar</button>` : "";
                    const div = document.createElement("div");
                    div.style.marginTop = "20px"; div.style.borderBottom = "2px solid #eee"; div.style.paddingBottom = "10px";
                    div.innerHTML = `<div style="text-align:left;"><b>${p.autor}</b> <button class="chat-btn" onclick="iniciarChat('${p.autor}')">Chatear</button></div><div id="contenedor-contenido-${id}" style="text-align:left;"></div>${p.imagenPost ? `<img src="${p.imagenPost}" style="width:100%; border-radius:10px;">` : ""}<div style="text-align:left;"><button class="like-btn" onclick="darLike('${id}')">❤️ ${p.likes || 0}</button><button class="share-btn" onclick="compartirPost('','${id}')">Compartir</button>${btnElim}</div><div class="com-section"><div id="lista-com-${id}"></div><div style="display:flex; gap:5px;"><input id="com-${id}" placeholder="Comentar..." style="margin:0; font-size:12px;"><button onclick="comentar('${id}')" style="margin:0; width:auto; padding:5px 10px; font-size:12px;">Enviar</button></div></div>`;
                    contenedor.appendChild(div);

                    onSnapshot(collection(db, "posts", id, "comentarios"), (snapCom) => {
                        const listaCom = document.getElementById(`lista-com-${id}`);
                        listaCom.innerHTML = "";
                        snapCom.forEach((docCom) => {
                            const com = docCom.data();
                            listaCom.innerHTML += `<p><b>${com.autor}:</b> ${com.texto}</p>`;
                        });
                    });

                    document.getElementById(`contenedor-contenido-${id}`).innerHTML = p.contenido.replace(/(https?:\/\/(?:twitter|x)\.com\/\w+\/status\/\d+)/g, '<blockquote class="twitter-tweet"><a href="$1"></a></blockquote>');
                });
                if(window.twttr) twttr.widgets.load();
                if (postIdParam) contenedor.innerHTML += `<button onclick="window.location.href='/'" style="background:#555;">⬅️ Ver todo el Feed</button>`;
            });
        }
    </script>
</body>
</html>
