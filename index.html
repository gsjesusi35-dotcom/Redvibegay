<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedVibegay</title>
    
    <!-- Script de Adsterra -->
    <script src="https://sensibleexterminatorprivate.com/fe/0b/6a/fe0b6a58ba0f6b2dab98a6738d5e87aa.js"></script>

    <style>
        body { 
            margin: 0; 
            background: #c2e9fb; 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
        }
        .screen { 
            background: white; 
            width: 90%; 
            max-width: 350px; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            text-align: center; 
        }
        .my-photo {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        input { 
            width: 100%; 
            padding: 10px; 
            margin: 10px 0; 
            border: 1px solid #ccc; 
            border-radius: 10px; 
            box-sizing: border-box; 
        }
        button { 
            width: 100%; 
            padding: 10px; 
            background: #6c63ff; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="screen" id="login-screen">
        <img src="https://i.ibb.co/G3C6s15X/1781744766796-edit-755643990183886.png" class="my-photo" alt="Imagen">

        <h2>Bienvenido</h2>
        <input type="text" id="user" placeholder="Nombre de usuario">
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="login()">Registrarse / Iniciar Sesión</button>
    </div>

    <script>
        function login() {
            // Esto redirige al archivo donde tienes tu feed
            window.location.href = "feed.html";
        }
    </script>
</body>
</html>
