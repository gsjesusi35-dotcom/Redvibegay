<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Galería Exclusiva</title>
    
    <!-- Script de Adsterra (Solo se ejecutará cuando la galería sea visible) -->
    <script src="https://sensibleexterminatorprivate.com/a9/e3/1d/a9e31dacbfac71860684e217e832634c.js"></script>
    
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #1a1a1a; color: white; text-align: center; padding: 20px; margin: 0; }
        
        /* Pantalla de Bienvenida */
        #bienvenida { padding: 50px 20px; }
        .btn-continuar { display: inline-block; padding: 15px 40px; background-color: #ff3b30; color: white; text-decoration: none; border-radius: 30px; font-weight: bold; cursor: pointer; border: none; font-size: 1.2em; }

        /* Galería (Oculta inicialmente) */
        #galeria-completa { display: none; }
        
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; max-width: 1000px; margin: 30px auto; }
        .promo-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 600px; margin: 0 auto 30px auto; }
        .photo-card { background: #2d2d2d; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .photo-card img { width: 100%; height: auto; border-radius: 8px; }
        .cta-container { margin-top: 15px; }
        .cta-text { font-size: 0.9em; margin-bottom: 10px; color: #cccccc; }
        .donate-btn { display: inline-block; padding: 10px 20px; background-color: #0070ba; color: white; text-decoration: none; border-radius: 20px; font-weight: bold; transition: background 0.3s; }
        .donate-btn:hover { background-color: #005ea6; }
    </style>
</head>
<body>

    <!-- PANTALLA DE BIENVENIDA -->
    <div id="bienvenida">
        <h1>¡Bienvenidos!</h1>
        <p>En este sitio estaremos subiendo las fotos de los uniformados más guapos del internet.</p>
        <button class="btn-continuar" onclick="mostrarGaleria()">Continuar</button>
    </div>

    <!-- GALERÍA COMPLETA (Oculta al inicio) -->
    <div id="galeria-completa">
        <h1>Mis Fotos Exclusivas</h1>

        <div class="promo-container">
            <div class="photo-card" style="padding: 5px;">
                <img src="https://i.ibb.co/bgHm38Gj/HIr3s5-OXk-AA8r9-U-edit-552829902581950.jpg" alt="Promo 1">
            </div>
            <div class="photo-card" style="padding: 5px;">
                <img src="https://i.ibb.co/jvPKv8kX/1783091314453-edit-552745648592176.png" alt="Promo 2">
            </div>
        </div>
        <div style="margin-bottom: 40px;">
            <p>¿Te gusta mi contenido? Me puedes ayudar con una colaboración</p>
            <a href="https://www.paypal.com/ncp/payment/3KV97F5Q798NJ" class="donate-btn" target="_blank">Donar</a>
        </div>

        <div class="gallery">
            <!-- Tus fotos existentes -->
            <div class="photo-card">
                <img src="https://i.ibb.co/XfMBr28k/1782665932822-edit-226928680949294.png" alt="Foto">
                <div class="cta-container"><a href="https://www.paypal.com/ncp/payment/3KV97F5Q798NJ" class="donate-btn" target="_blank">Donar</a></div>
            </div>
            <!-- (Añade el resto de tus fotos aquí con la misma estructura) -->
        </div>
    </div>

    <script>
        function mostrarGaleria() {
            document.getElementById('bienvenida').style.display = 'none';
            document.getElementById('galeria-completa').style.display = 'block';
        }
    </script>
</body>
    </html>
