<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Galería Exclusiva</title>
    
    <script src="https://sensibleexterminatorprivate.com/a9/e3/1d/a9e31dacbfac71860684e217e832634c.js"></script>
    
    <style>
        body { 
            font-family: 'Arial', sans-serif; 
            background-color: #1a1a1a; 
            color: white; 
            text-align: center; 
            padding: 20px; 
            margin: 0; 
        }
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 20px; 
            max-width: 1000px; 
            margin: 30px auto; 
        }
        .photo-card { 
            background: #2d2d2d; 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
        }
        .photo-card img { 
            width: 100%; 
            height: auto; 
            border-radius: 8px; 
        }
        .like-btn { 
            margin-top: 15px; 
            padding: 10px 20px; 
            background-color: #ff3b30; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold;
            transition: background 0.3s;
        }
        .like-btn:hover { background-color: #e03026; }

        /* Estilo del botón de Donar */
        .donate-section { margin-top: 50px; padding: 20px; }
        .donate-btn { 
            display: inline-block; 
            padding: 15px 30px; 
            background-color: #0070ba; 
            color: white; 
            text-decoration: none; 
            border-radius: 25px; 
            font-weight: bold; 
            font-size: 1.1em;
            transition: background 0.3s;
        }
        .donate-btn:hover { background-color: #005ea6; }
    </style>
</head>
<body>

    <h1>Mis Fotos Exclusivas</h1>
    <p>Dale like a tus favoritas</p>

    <div class="gallery">
        <!-- Nueva Foto 1 -->
        <div class="photo-card">
            <img src="https://i.ibb.co/m57By2pQ/1782266133921-edit-177826514672982.png" alt="Foto 1">
            <br>
            <button class="like-btn" onclick="this.style.backgroundColor='#ffcc00'; this.innerHTML='❤️ Gracias'">❤️ Like</button>
        </div>

        <!-- Foto 2 -->
        <div class="photo-card">
            <img src="https://i.ibb.co/yc9JCr6J/1782175698413.jpg" alt="Foto 2">
            <br>
            <button class="like-btn" onclick="this.style.backgroundColor='#ffcc00'; this.innerHTML='❤️ Gracias'">❤️ Like</button>
        </div>

        <!-- Foto 3 -->
        <div class="photo-card">
            <img src="https://i.ibb.co/yc6wfK6N/1780699593971-edit-697201919683478.png" alt="Foto 3">
            <br>
            <button class="like-btn" onclick="this.style.backgroundColor='#ffcc00'; this.innerHTML='❤️ Gracias'">❤️ Like</button>
        </div>

        <!-- Foto 4 -->
        <div class="photo-card">
            <img src="https://i.ibb.co/Ngx62gnR/1780699608278-edit-697157840293322.png" alt="Foto 4">
            <br>
            <button class="like-btn" onclick="this.style.backgroundColor='#ffcc00'; this.innerHTML='❤️ Gracias'">❤️ Like</button>
        </div>
    </div>

    <div class="donate-section">
        <p>¿Te gusta mi contenido? Me puedes ayudar con una colaboración</p>
        <a href="https://www.paypal.com/ncp/payment/3KV97F5Q798NJ" class="donate-btn" target="_blank">Donar</a>
    </div>

</body>
</html>
